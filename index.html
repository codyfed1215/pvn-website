<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PureVida | Pure Water, Ice & Coffee Solutions</title>
  <meta name="description" content="Sustainable hydration solutions for businesses and homes. Pure water, zero bottles.">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-56K4HHW2DY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-56K4HHW2DY');
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00bcd4;
      --cyan-light: #00e5ff;
      --blue-dark: #0a5c8a;
      --blue-deeper: #064a73;
      --white: #ffffff;
      --gray-100: #f5f7fa;
      --gray-500: #64748b;
      --gray-900: #0f172a;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--gray-900);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* === LOGO === */
    .logo {
      position: absolute;
      top: 32px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 0;
      z-index: 10;
    }
    .logo img {
      height: 72px;
      width: auto;
    }

    /* === MAIN CONTENT === */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 40px;
      text-align: center;
    }

    .main h1 {
      font-size: 48px;
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    .main h1 span {
      color: var(--cyan);
    }

    .main .subtitle {
      font-size: 18px;
      color: var(--gray-500);
      margin-bottom: 48px;
    }

    /* === SELECTOR CARDS === */
    .cards {
      display: flex;
      gap: 24px;
      max-width: 880px;
      width: 100%;
    }

    .card {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 28px 28px;
      border-radius: 16px;
      text-decoration: none;
      color: var(--white);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }

    .card-commercial {
      background: linear-gradient(135deg, #064a73 0%, #0a6e9e 100%);
    }
    .card-residential {
      background: linear-gradient(135deg, #00b4d8 0%, #00e5ff 100%);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon svg {
      width: 24px;
      height: 24px;
      stroke: white;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-content {
      flex: 1;
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.8;
      margin-bottom: 2px;
    }
    .card-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.5;
    }

    .card-arrow {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-arrow svg {
      width: 18px;
      height: 18px;
      stroke: white;
      fill: none;
      stroke-width: 2;
    }

    /* === WATER IMAGE === */
    .water-section {
      width: 100%;
      overflow: hidden;
      line-height: 0;
      margin-top: auto;
    }
    .water-section img {
      width: 100%;
      height: auto;
      display: block;
    }
    .water-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(56,189,248,0.08) 30%, rgba(14,165,233,0.15) 100%);
      position: relative;
      overflow: hidden;
    }
    .water-placeholder::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(180deg, transparent, rgba(14,165,233,0.12));
    }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      .logo {
        top: 20px;
        left: 20px;
      }
      .logo img {
        height: 56px;
      }
      .main {
        padding: 100px 20px 32px;
      }
      .main h1 {
        font-size: 30px;
      }
      .main .subtitle {
        font-size: 15px;
        margin-bottom: 32px;
      }
      .cards {
        flex-direction: column;
        gap: 16px;
      }
      .card {
        padding: 22px 20px;
      }
      .card-title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png" alt="PureVida">
  </div>

  <!-- MAIN SELECTOR -->
  <div class="main">
    <h1>Welcome to <span>PureVida</span></h1>
    <p class="subtitle">Select your environment to see solutions tailored for you</p>

    <div class="cards">
      <a href="/commercial/" class="card card-commercial">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M3 21h18M3 7v14M21 7v14M6 11h4M6 15h4M14 11h4M14 15h4M9 21V17h6v4M12 3l9 4M12 3L3 7"/></svg>
        </div>
        <div class="card-content">
          <div class="card-label">For Businesses</div>
          <div class="card-title">Commercial</div>
          <div class="card-desc">Water, Ice & Coffee Solutions for Businesses of Every Size</div>
        </div>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24"><path d="M5 12h14m-6-6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </a>

      <a href="/residential/" class="card card-residential">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path d="M9 22V12h6v10"/></svg>
        </div>
        <div class="card-content">
          <div class="card-label">For Homes</div>
          <div class="card-title">Residential</div>
          <div class="card-desc">Pure, Clean, Safe Water for Your Family and Home</div>
        </div>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24"><path d="M5 12h14m-6-6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </a>
    </div>
  </div>

  <!-- WATER SPLASH -->
  <div class="water-section">
    <div class="water-placeholder"></div>
  </div>

</body>
</html>
